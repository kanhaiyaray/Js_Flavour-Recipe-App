
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Recipe App</title>
    <!-- link bootstrap file to use it  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <!-- LINK CSS FILE   -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-black text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Food Recipe App</span>
        <div class="d-flex" id="auth-buttons">
          <button type="button" class="btn btn-outline-light me-2" id="nav-login-btn">Login</button>
          <button type="button" class="btn btn-primary" id="nav-signup-btn">Sign Up</button>
        </div>
        <div class="d-flex d-none" id="user-info">
          <span class="navbar-text me-3" id="user-greeting"></span>
          <button type="button" class="btn btn-outline-danger" id="logout-btn">Logout</button>
        </div>
      </div>
    </nav>

    <!-- Auth Widget (Dropdown) -->
    <div id="auth-widget" class="auth-widget-hidden">
      <div class="auth-container" id="auth-container">
        <div class="auth-form-container sign-up-container">
          <form id="signup-form">
            <h1>Create Account</h1>
            <input type="text" id="signup-name" placeholder="Name" required autocomplete="name" />
            <input type="email" id="signup-email" placeholder="Email" required autocomplete="email" />
            <input type="password" id="signup-password" placeholder="Password" required autocomplete="new-password" />
            <div class="text-danger mb-3 d-none" id="signup-error" style="font-size: 13px; font-weight: bold; margin-top: 5px;"></div>
            <button class="auth-btn" type="submit">Sign Up</button>
          </form>
        </div>
        <div class="auth-form-container sign-in-container">
          <form id="login-form">
            <h1>Sign In</h1>
            <input type="email" id="login-email" placeholder="Email" required autocomplete="email" />
            <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" />
            <div class="text-danger mb-3 d-none" id="login-error" style="font-size: 13px; font-weight: bold; margin-top: 5px;"></div>
            <button class="auth-btn" type="submit">Sign In</button>
          </form>
        </div>
        <div class="overlay-container">
          <div class="overlay">
            <div class="overlay-panel overlay-left">
              <h1>Welcome Back!</h1>
              <p>To keep connected with us please login</p>
              <button class="auth-btn ghost" id="signIn" type="button">Sign In</button>
            </div>
            <div class="overlay-panel overlay-right">
              <h1>Hello, Friend!</h1>
              <p>Enter your personal details to join</p>
              <button class="auth-btn ghost" id="signUp" type="button">Sign Up</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main App Content (Hidden when not logged in) -->
    <div id="app-content" class="d-none">
      <div class="container my-3 text-center">
        <!-- BOOTSTAP(WEBSITE) >> BUTTON >> OUTLINE BUTTON -->
         <!-- TO SELECT MULTIPLE LINE TO CHANGE OR WRITE SOMETHING IN IT USE ALT+ENTER BUTTON -->
          <!-- ID SHOULD BE UNIQUE  -->
      <button id="indian" type="button" class="btn btn-outline-primary mx-3">Indian</button> 
      <button id="canadian" type="button" class="btn btn-outline-warning mx-3">Canadian</button>
      <button id="american" type="button" class="btn btn-outline-success mx-3">American</button>
      <button id="thai" type="button" class="btn btn-outline-info mx-3">Thai</button>
      <button id="british" type="button" class="btn btn-outline-warning mx-3">British</button>
      <button id="russian" type="button" class="btn btn-outline-info mx-3">Russian</button>
    </div>
      <!-- TO CREATE SEARCH BAR -->
    <div class="container text-center">
        <input type="text" id="search" title="search" placeholder="type food here..">
    </div>

    <div class="food">

    </div>
    </div>
   <!-- LINK JS FILE  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
